     Required from founder before flipping to paid:
       - GA4_MEASUREMENT_ID  (Google Analytics 4)
       - GTM_CONTAINER_ID    (optional; if using GTM as the router)
       - POSTHOG_PROJECT_KEY (PostHog public project API key)
       - POSTHOG_HOST        (us.i.posthog.com or eu.i.posthog.com)
     See growth/tracking-readiness-checklist.md for the full list.

    GTM_CONTAINER_ID:    '',  // e.g. 'GTM-XXXXXXX'
    POSTHOG_PROJECT_KEY: '',  // e.g. 'phc_XXXXXXXXXXXXXXXXXXXX'
    POSTHOG_HOST:        'https://us.i.posthog.com',
    DEBUG: false
  };
</script>

<!-- GA4 (gtag) — loads only when GA4_MEASUREMENT_ID is set. -->
<script>
  (function () {
    var id = (window.VARITEA_CONFIG || {}).GA4_MEASUREMENT_ID;
    if (!id) return;
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id=' + encodeURIComponent(id);
    document.head.appendChild(s);
    window.dataLayer = window.dataLayer || [];
    window.gtag = function () { window.dataLayer.push(arguments); };
    window.gtag('js', new Date());
    window.gtag('config', id, { send_page_view: false }); // tracker fires page_view
  })();
</script>

<!-- GTM — loads only when GTM_CONTAINER_ID is set. -->
<script>
  (function () {
    var id = (window.VARITEA_CONFIG || {}).GTM_CONTAINER_ID;
    if (!id) return;
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
    var f = document.getElementsByTagName('script')[0];
    var j = document.createElement('script');
    j.async = true;
    j.src = 'https://www.googletagmanager.com/gtm.js?id=' + encodeURIComponent(id);
    f.parentNode.insertBefore(j, f);
  })();
</script>

<style>
  :root{
    --cream:#F8F2EA;
    --cream-2:#FCF8F2;
    --ink:#2D241E;
    --plum:#463047;
    --cta:#8E78A6;
    --cta-hover:#7a649a;
    --lavender:#D8C8E4;
    --sage:#A2AD8E;
    --amber:#D2AE64;
    --serif:'Instrument Serif',Georgia,serif;
    --sans:'Inter',system-ui,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
  body{
    scroll-snap-type:y mandatory;
    overflow-x:hidden;
    overflow-y:scroll;
    height:100vh;
    height:100dvh;
  }
  /* leaf canvas — fixed full-viewport overlay */
  #leaf-canvas{
    position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;
    pointer-events:none;z-index:50;
  }
  /* progress rail */
  .rail{
    position:fixed;top:0;left:0;height:2px;width:100%;z-index:60;
    background:transparent;
  }
  .rail__fill{
    height:100%;width:0;background:var(--plum);
    transition:width .15s linear;
  }
  /* skip link / wordmark */
  .top{
    position:fixed;top:0;left:0;right:0;z-index:55;
    padding:18px 22px;display:flex;justify-content:space-between;align-items:center;
    pointer-events:none;
  }
  .wordmark{
    font-family:var(--serif);font-size:22px;line-height:1;color:var(--ink);
    letter-spacing:.01em;pointer-events:auto;text-decoration:none;
    display:inline-flex;align-items:center;gap:8px;
  }
  .wordmark__glyph{
    width:18px;height:18px;display:block;
  }
  .nav-why{
    font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:.02em;
    color:var(--plum);text-decoration:none;pointer-events:auto;
    background:rgba(252,248,242,.7);backdrop-filter:blur(6px);
    padding:7px 14px;border-radius:999px;border:1px solid rgba(70,48,71,.14);
    transition:background .2s,transform .2s;
  }
  .nav-why:hover{background:rgba(252,248,242,.95);transform:translateY(-1px)}
  .skip{
    font-family:var(--sans);font-size:12px;letter-spacing:.04em;color:var(--ink);
    text-decoration:none;opacity:.65;pointer-events:auto;
    border-bottom:1px solid rgba(45,36,30,.25);padding-bottom:1px;
  }
  .skip:hover{opacity:1}
  /* each screen */
  section{
    position:relative;width:100vw;height:100vh;height:100dvh;
    scroll-snap-align:start;scroll-snap-stop:always;
    display:flex;flex-direction:column;justify-content:flex-end;align-items:center;
    overflow:hidden;
    padding:0 24px 56px;
    isolation:isolate;
  }
  /* full-bleed media */
  .bg{
    position:absolute;inset:0;z-index:-1;
    display:block;width:100%;height:100%;object-fit:cover;
  }
  .bg-tint{
    position:absolute;inset:0;z-index:-1;
    background:linear-gradient(180deg,rgba(45,36,30,0) 35%,rgba(45,36,30,.55) 100%);
  }
  /* screen 1 — Awaken */
  .s1{justify-content:space-between;padding:96px 24px 56px}
  .s1 .copy-top{color:var(--ink);text-align:center;max-width:320px;width:100%}
  .s1 .copy{color:var(--ink);text-align:center;max-width:320px}
  .s1 h1{
    font-family:var(--serif);font-weight:400;font-style:italic;
    font-size:clamp(36px,9vw,52px);line-height:1.02;
    margin:0;color:var(--plum);
  }
  .s1 .hero-sub{
    font-family:var(--sans);font-size:15px;line-height:1.45;font-weight:400;
    margin:14px auto 0;max-width:300px;color:var(--ink);opacity:.78;
  }
  .s4 .reassure{
    font-family:var(--sans);font-size:13px;line-height:1.45;font-weight:400;
    margin:0 auto 18px;max-width:300px;color:#FCF8F2;opacity:.92;
    text-shadow:0 1px 16px rgba(0,0,0,.4);
  }
  /* screen 2 — Three teas: auto-rotating stack with crossfade */
  .s2{padding:0;align-items:stretch;justify-content:flex-start}
  /* s2 v2 — embedded three-teas experience (papercraft + Three.js leaf burst) */
  .s2--v2{position:relative;overflow:hidden;background:var(--cream)}
  .s2--v2::after{display:none}
  .s2__frame{position:absolute;inset:0;width:100%;height:100%;border:0;display:block;background:var(--cream)}
  .s2::after{
    content:"";position:absolute;inset:0;z-index:-1;
    background:
      radial-gradient(120% 80% at 30% 20%,#D8C8E4 0%,#F8F2EA 60%,#FCF8F2 100%);
    transition:background .9s ease;
  }
  .s2[data-active="0"]::after{background:radial-gradient(120% 80% at 30% 20%,#EFE3D6 0%,#F8F2EA 60%,#FCF8F2 100%)}
  .s2[data-active="1"]::after{background:radial-gradient(120% 80% at 30% 20%,#E5D5EE 0%,#F4E7E9 60%,#FCF8F2 100%)}
  .s2[data-active="2"]::after{background:radial-gradient(120% 80% at 30% 20%,#CCD4BC 0%,#EBE6D2 60%,#FCF8F2 100%)}
  .pouches{
    position:absolute;inset:0;
    display:grid;place-items:center;
  }
  .pouch{
    grid-area:1/1;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    padding:0 28px 96px;text-align:center;
    width:100%;height:100%;
    opacity:0;transform:scale(.92) translateY(20px);
    transition:opacity .7s ease,transform .7s cubic-bezier(.2,.7,.2,1);
    pointer-events:none;
  }
  .pouch.is-active{opacity:1;transform:none;pointer-events:auto}
  .pouch__shape{
    width:min(72vw,300px);height:min(72vw,300px);
    border-radius:24px;
    display:flex;align-items:flex-end;justify-content:center;padding:24px;
    box-shadow:0 30px 60px -28px rgba(45,36,30,.28),0 16px 30px -22px rgba(45,36,30,.18);
    margin-bottom:32px;position:relative;overflow:hidden;
  }
  .pouch__shape::before{
    content:"";position:absolute;top:0;left:0;right:0;height:38%;
    background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,0));
  }
  .pouch--dark      .pouch__shape{background:#2D241E;color:#F8F2EA}
  .pouch--lavender  .pouch__shape{background:linear-gradient(180deg,#D8C8E4 0%,#EFD9DC 100%);color:#463047}
  .pouch--tangerine .pouch__shape{background:linear-gradient(180deg,#A2AD8E 0%,#CDC9A6 100%);color:#2D241E}
  /* subtle pouch branding */
  .pouch__brand{
    position:absolute;top:22px;left:0;right:0;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    font-family:var(--serif);font-style:italic;font-size:20px;line-height:1;
    opacity:.72;letter-spacing:.01em;
  }
  .pouch__brand small{
    font-family:var(--sans);font-style:normal;font-size:8.5px;font-weight:500;
    letter-spacing:.22em;text-transform:uppercase;opacity:.7;
  }
  .pouch__band{
    font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:.06em;
    padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.18);backdrop-filter:blur(6px);
  }
  .pouch h2{
    font-family:var(--serif);font-weight:400;font-size:clamp(32px,8vw,44px);
    line-height:1;margin:0;color:var(--plum);
  }
  .pouch__note{
    margin-top:10px;font-size:13px;color:rgba(45,36,30,.6);letter-spacing:.02em;
  }
  /* dot pagination for s2 */
  .dots{
    position:absolute;bottom:84px;left:0;right:0;
    display:flex;gap:8px;justify-content:center;z-index:2;
  }
  .dots span{
    width:6px;height:6px;border-radius:999px;background:rgba(45,36,30,.22);
    transition:background .3s ease,width .3s ease;
  }
  .dots span.is-active{background:var(--plum);width:22px}
  /* screen 3 — Ritual: looping video */
  .s3 video.bg{filter:saturate(1.05) contrast(1.02)}
  .s3 .copy{text-align:center;color:#FCF8F2;max-width:300px;padding-bottom:24px}
  .s3 h2{
    font-family:var(--serif);font-weight:400;font-style:italic;
    font-size:clamp(36px,9vw,48px);line-height:1.05;margin:0;
    text-shadow:0 2px 30px rgba(0,0,0,.35);
  }
  /* screen 4 — Take it home */
  .s4{justify-content:flex-end}
  .s4 .copy{text-align:center;color:#FCF8F2;max-width:320px;padding-bottom:8px}
  .s4 .chip{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(252,248,242,.92);color:var(--plum);
    padding:8px 14px;border-radius:999px;font-size:12px;font-weight:500;letter-spacing:.04em;
    margin-bottom:18px;backdrop-filter:blur(6px);
  }
  .chip__dot{width:6px;height:6px;background:var(--cta);border-radius:999px}
  .s4 h2{
    font-family:var(--serif);font-weight:400;font-style:italic;
    font-size:clamp(40px,10vw,56px);line-height:1.02;margin:0 0 24px;
    color:#FCF8F2;text-shadow:0 2px 36px rgba(0,0,0,.35);
  }
  /* CTAs */
  .cta-stack{display:flex;flex-direction:column;gap:12px;align-items:stretch;width:100%;max-width:340px;margin:0 auto}
  .cta{
    display:inline-flex;align-items:center;justify-content:center;gap:10px;
    padding:16px 22px;border-radius:999px;text-decoration:none;
    font-family:var(--sans);font-size:15px;font-weight:500;letter-spacing:.01em;
    transition:transform .25s cubic-bezier(.2,.7,.2,1),background .25s ease,box-shadow .25s ease;
  }
  .cta--primary{
    background:var(--cta);color:#FCF8F2;
    box-shadow:0 20px 40px -18px rgba(142,120,166,.65),0 0 0 1px rgba(255,255,255,.08) inset;
  }
  .cta--primary:hover,.cta--primary:active{background:var(--cta-hover);transform:translateY(-1px)}
  .cta--ghost{
    background:rgba(252,248,242,.12);color:#FCF8F2;border:1px solid rgba(252,248,242,.35);
    backdrop-filter:blur(6px);
  }
  .cta--ghost:hover{background:rgba(252,248,242,.2)}
  .cta__arrow{
    width:16px;height:16px;transition:transform .25s ease;
  }
  .cta:hover .cta__arrow{transform:translateX(3px)}
  /* pulse ring on s1 cta */
  .pulse{position:relative}
  .pulse::after{
    content:"";position:absolute;inset:-4px;border-radius:999px;
    border:1.5px solid var(--cta);opacity:.6;
    animation:pulse 2.2s ease-out infinite;
  }
  @keyframes pulse{
    0%{transform:scale(1);opacity:.55}
    100%{transform:scale(1.35);opacity:0}
  }
  /* scroll hint */
  .hint{
    position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;gap:6px;
    color:var(--ink);opacity:.55;font-size:11px;letter-spacing:.08em;text-transform:lowercase;
  }
  .hint__line{width:1px;height:24px;background:currentColor;animation:drop 1.6s ease-in-out infinite}
  @keyframes drop{
    0%{transform:scaleY(0);transform-origin:top}
    50%{transform:scaleY(1);transform-origin:top}
    51%{transform:scaleY(1);transform-origin:bottom}
    100%{transform:scaleY(0);transform-origin:bottom}
  }
  /* reveal */
  [data-reveal]{opacity:0;transform:translateY(14px);transition:opacity .9s ease,transform .9s ease}
  .is-visible [data-reveal],section.is-visible [data-reveal]{opacity:1;transform:none}
  [data-reveal][data-d="1"]{transition-delay:.1s}
  [data-reveal][data-d="2"]{transition-delay:.22s}
  [data-reveal][data-d="3"]{transition-delay:.34s}
  /* desktop framing — present mobile as a phone-shaped viewport when wide */
  @media (min-width:900px){
    body{
      background:#221c1a;display:flex;align-items:center;justify-content:center;
      height:100vh;height:100dvh;overflow:hidden;scroll-snap-type:none;
    }
    #stage{
      width:390px;height:844px;border-radius:48px;overflow:hidden;
      box-shadow:0 60px 120px -40px rgba(0,0,0,.55),0 0 0 10px #0f0c0b,0 0 0 11px #2a2522;
      position:relative;
      scroll-snap-type:y mandatory;overflow-y:scroll;overflow-x:hidden;
    }
    #leaf-canvas{position:absolute}
    .top{position:absolute}
    .rail{position:absolute}
    section{width:390px;height:844px}
  }
  @media (max-width:899px){
    #stage{display:contents}
  }
  @media (prefers-reduced-motion: reduce){
    .pulse::after{animation:none}
    .hint__line{animation:none;opacity:.6}
    [data-reveal]{opacity:1;transform:none;transition:none}
  }
</style>
</head>
<body data-analytics-page="landing">

<div id="stage">
  <canvas id="leaf-canvas" aria-hidden="true"></canvas>

  <div class="rail" aria-hidden="true"><div class="rail__fill" id="rail"></div></div>

  <header class="top">
    <a class="wordmark" href="#s1" aria-label="Varitea home">
      <img class="wordmark__glyph" src="assets/brand/glyph-plum.svg" alt="" aria-hidden="true">
      <span>Varitea</span>
    </a>
    <a class="nav-why" href="/blog" data-analytics="hero_nav_why" data-analytics-event="nav_click" data-cta-label="Why Varitea">Why Varitea?</a>
  </header>

  <!-- ============ SCREEN 1 — AWAKEN ============ -->
  <section class="s1" id="s1" data-i="0">
    <img class="bg" src="assets/hero-mobile.png" alt="">
    <div class="copy-top">
      <h1 data-reveal data-d="1" id="hero-headline">A better daily drink.</h1>
      <p class="hero-sub" data-reveal data-d="2" id="hero-subhead" hidden></p>
    </div>
    <div class="copy">
      <a href="#s2" class="cta cta--primary pulse" data-reveal data-d="2" data-analytics="s1_begin" data-analytics-event="hero_cta_click" data-cta-label="Tap to begin" id="hero-cta">
        <span class="cta__text">Tap to begin</span>
        <svg class="cta__arrow" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 5v14M6 13l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>
    <div class="hint" aria-hidden="true"><span class="hint__line"></span></div>
  </section>

  <!-- ============ SCREEN 2 — THREE TEAS (s2 v2: papercraft + Three.js) ============ -->
  <section class="s2 s2--v2" id="s2" data-i="1" aria-label="Three teas">
    <iframe class="s2__frame" src="/preview/s2-v2/?embed=1"
            title="Choose your tea" loading="lazy"
            allow="autoplay" scrolling="no"></iframe>
  </section>

  <!-- ============ SCREEN 3 — RITUAL ============ -->
  <section class="s3" id="s3" data-i="2" aria-label="Ritual">
    <video class="bg" id="ritual-video" src="assets/amber-pour.mp4" playsinline muted loop preload="metadata" aria-hidden="true"></video>

<script type="module">
import * as THREE from 'https://esm.sh/three@0.160.0';

/* ============ THREE.JS FALLING TEA LEAVES ============ */
const canvas = document.getElementById('leaf-canvas');
const stage  = document.getElementById('stage');

const isDesktop = () => window.matchMedia('(min-width:900px)').matches;
const sizeTarget = () => isDesktop() ? stage : window;

const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0.1,10);
camera.position.z = 1;

let W = 1, H = 1;
function resize(){
  const t = sizeTarget();
  W = isDesktop() ? t.clientWidth  : window.innerWidth;
  H = isDesktop() ? t.clientHeight : window.innerHeight;
  renderer.setSize(W, H, false);
  camera.left   = -W/2;
  camera.right  =  W/2;
  camera.top    =  H/2;
  camera.bottom = -H/2;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

const loader = new THREE.TextureLoader();
const tex1 = loader.load('assets/leaf1.png');
const tex2 = loader.load('assets/leaf2.png');
[tex1,tex2].forEach(t=>{ t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = 4; });

const LEAF_COUNT = matchMedia('(max-width:600px)').matches ? 7 : 11;
const leaves = [];

function rand(a,b){ return a + Math.random()*(b-a); }

function spawnLeaf(initial=false){
  const tex = Math.random() < 0.5 ? tex1 : tex2;
  const size = rand(14, 26);
  const mat  = new THREE.MeshBasicMaterial({ map:tex, transparent:true, depthWrite:false, opacity:rand(0.18, 0.35) });
  const geo  = new THREE.PlaneGeometry(size, size);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.x = rand(-W/2 + 20, W/2 - 20);
  mesh.position.y = initial ? rand(0, H/2) : rand(H/2 + 40, H/2 + 300);
  mesh.rotation.z = rand(0, Math.PI*2);
  scene.add(mesh);
  return {
    mesh,
    vy: rand(0.08, 0.22),     // slow base fall speed
    vx: rand(-0.15, 0.15),    // gentle drift
    wob: rand(0.3, 0.8),      // small sway amplitude
    wobFreq: rand(0.0006, 0.0014),
    spin: rand(-0.002, 0.002),
    spinDamp: 1,
    settled: false,
    restY: 0,                 // y-position where this leaf will rest
    size,
    seed: rand(0, 1000),
  };
}

for(let i=0;i<LEAF_COUNT;i++) leaves.push(spawnLeaf(true));

/* ============ SCROLL → MOTION COUPLING ============ */
let scrollProgress = 0;     // 0..1 over the whole 4-screen scroll
let velocityBoost  = 0;     // momentary boost when user scrolls
let lastScroll = 0;
let lastTs = performance.now();

function getScroller(){ return isDesktop() ? stage : (document.scrollingElement || document.documentElement); }

function onScroll(){
  const sc  = getScroller();
  const max = Math.max(1, sc.scrollHeight - sc.clientHeight);
  const p   = Math.min(1, Math.max(0, sc.scrollTop / max));
  const dy  = sc.scrollTop - lastScroll;
  lastScroll = sc.scrollTop;
  velocityBoost = Math.min(8, velocityBoost + Math.abs(dy) * 0.012);
  scrollProgress = p;
  document.getElementById('rail').style.width = (p*100).toFixed(2)+'%';
  syncSections(p);
  syncVideo(p);
  syncPouches();
}

const sections = [...document.querySelectorAll('section')];
function syncSections(p){
  // 4 sections → index = p * 3
  const idx = Math.round(p * (sections.length - 1));
  sections.forEach((s,i)=> s.classList.toggle('is-visible', i <= idx));
}

const video = document.getElementById('ritual-video');
let videoPlaying = false;
function syncVideo(p){
  // s3 is index 2 of 4 → centered around p≈0.66
  const inRitual = p > 0.45 && p < 0.85;
  if(inRitual && !videoPlaying){
    video.play().catch(()=>{});
    videoPlaying = true;
  } else if(!inRitual && videoPlaying){
    video.pause();
    videoPlaying = false;
  }
}

/* Screen 2 is now the embedded s2-v2 experience (papercraft + Three.js leaf burst).
   The interactive tea selection lives inside the /preview/s2-v2/ iframe, which owns
   its own taps, swipes, lane-color reveal, and burst animation. No parent-side
   carousel logic is needed here. */
function syncPouches(){ /* no-op: s2 handled inside the embedded experience */ }

getScroller().addEventListener('scroll', onScroll, { passive:true });
window.addEventListener('scroll', onScroll, { passive:true });
onScroll();

/* ============ ANIMATION LOOP ============ */
// leaves settle and pile up at the bottom of the viewport.
// each leaf gets a slightly randomized rest line just inside the bottom edge.
function floorYFor(L){
  // small jitter so they don't form a perfect line
  return -H/2 + L.size * 0.35 + (L.seed % 14);
}

function tick(ts){
  const dt = Math.min(40, ts - lastTs);
  lastTs = ts;

  // damp velocity boost
  velocityBoost *= 0.92;

  // gentler global gravity — we want a calm fall, not a storm
  const gravity = 0.35 + scrollProgress * 0.6 + velocityBoost * 0.25;

  for(const L of leaves){
    if(L.settled){
      // resting at the bottom — hold position, let rotation slowly decay
      L.mesh.rotation.z += L.spin * dt * L.spinDamp;
      L.spinDamp *= 0.985;
      if(Math.abs(L.spinDamp) < 0.01) L.spinDamp = 0;
      continue;
    }

    L.mesh.position.y -= (L.vy * dt * gravity);
    L.mesh.position.x += Math.sin((ts + L.seed*1000) * L.wobFreq) * L.wob + L.vx;
    L.mesh.rotation.z += L.spin * dt * (1 + velocityBoost * 0.15);

    // settle on the floor
    const restY = floorYFor(L);
    if(L.mesh.position.y <= restY){
      L.mesh.position.y = restY;
      L.settled = true;
      L.restY = restY;
      // ease rotation to a more natural resting tilt
      L.spin *= 0.4;
    }

    // wrap horizontally so drifting leaves don't disappear off-screen
    if(L.mesh.position.x >  W/2 - 10) L.mesh.position.x =  W/2 - 10;
    if(L.mesh.position.x < -W/2 + 10) L.mesh.position.x = -W/2 + 10;
  }

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// when viewport size changes, re-anchor any settled leaves to the new floor
window.addEventListener('resize', ()=>{
  for(const L of leaves){
    if(L.settled){ L.mesh.position.y = floorYFor(L); L.restY = L.mesh.position.y; }
  }
});

/* respect reduced motion */
if(matchMedia('(prefers-reduced-motion: reduce)').matches){
  canvas.style.display = 'none';
}
</script>

<!-- ============================================================
     EXP-001 UTM HERO COPY-SWAP  (owner: Jared / Brand+UX)
     --------------------------------------------------------------
     Single experiment variable: the message angle. Same offer,
     same price, same landing structure, same checkout. We read
     utm_campaign and swap Screen-1 headline + subhead + hero CTA
     and the Screen-4 reassurance line. Sets body[data-page-variant]
     BEFORE app.js (deferred) runs, so every tracked event carries
     the correct page_variant for the A/B read.

     Source of truth for these strings: jared-dispatch.md §2/§5 and
     docs/exp-001-variants.md (CMS table). Do NOT edit copy here
     without bumping the CMS table + telling Ronny — it changes the
     A/B read.
     ============================================================ -->
<script>
  (function () {
    var VARIANTS = {
      pmf_choice_overload: {
        page_variant: 'choice_overload',
        headline: 'Tea stores have too many choices.',
        subhead:  'We made it easy. Start with three.',
        hero_cta: 'Start with 3 Teas — $19',
        reassure: "You don't need to know anything about tea to order."
      },
      pmf_coffee_alt: {
        page_variant: 'coffee_switch',
        headline: 'A better afternoon than coffee.',
        subhead:  'Three teas for energy, calm, and caffeine-free evenings. No jitters.',
        hero_cta: 'Try the Switch — $19',
        reassure: 'Made for coffee drinkers. No bitterness, no crash.'
      }
    };

    // 1) utm_campaign from the URL wins; otherwise fall back to the
    //    value the tracker persisted (varitea.utm, 30-day TTL) so the
    //    swap is consistent on reloads / returning sessions.
    function campaignFromUrl() {
      try { return new URLSearchParams(location.search).get('utm_campaign'); }
      catch (e) { return null; }
    }
    function campaignFromStorage() {
      try {
        var raw = window.localStorage.getItem('varitea.utm');
        if (!raw) return null;
        var o = JSON.parse(raw);
        if (!o || !o._ts) return null;
        if (Date.now() - o._ts > 30 * 24 * 60 * 60 * 1000) return null;
        return o.utm_campaign || null;
      } catch (e) { return null; }
    }

    var campaign = campaignFromUrl() || campaignFromStorage();
    var v = (campaign && VARIANTS[campaign]) || null;
    var pageVariant = v ? v.page_variant : 'default';

    // Always set page_variant so the tracker reads it on every event.
    document.body.setAttribute('data-page-variant', pageVariant);

    if (!v) return; // default copy already in the HTML — nothing to swap.

    function setText(id, text) {
      var el = document.getElementById(id);
      if (el) el.textContent = text;
    }
    function showText(id, text) {
      var el = document.getElementById(id);
      if (el) { el.textContent = text; el.hidden = false; }
    }

    setText('hero-headline', v.headline);
    showText('hero-subhead', v.subhead);
    showText('hero-reassure', v.reassure);

    // Hero CTA: swap the visible label AND the data-cta-label attribute
    // so the tracked cta_label matches the shipped copy (Ronny reads it).
    var heroCta = document.getElementById('hero-cta');
    if (heroCta) {
      heroCta.setAttribute('data-cta-label', v.hero_cta);
      var t = heroCta.querySelector('.cta__text');
      if (t) t.textContent = v.hero_cta;
    }
  })();
</script>
