<style>
  :root{
    --cream:#F8F2EA; --ink:#2D241E; --plum:#463047;
    --cta:#8E78A6; --cta-hover:#7a649a;
    --serif:'Instrument Serif',Georgia,serif;
    --sans:'Inter',system-ui,sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);font-family:var(--sans)}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center}
  .glyph{width:36px;height:36px;margin-bottom:24px;opacity:.8}
  h1{font-family:var(--serif);font-style:italic;font-weight:400;font-size:clamp(36px,8vw,52px);line-height:1.05;margin:0 0 18px;color:var(--plum)}
  p{max-width:420px;margin:0 auto 14px;line-height:1.55;color:rgba(45,36,30,.78);font-size:15px}
  .order{font-family:var(--sans);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:rgba(45,36,30,.55);margin-top:24px}
  .order code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:0;text-transform:none}
  .cta{
    display:inline-flex;align-items:center;justify-content:center;gap:10px;
    padding:14px 22px;border-radius:999px;text-decoration:none;
    font-family:var(--sans);font-size:14px;font-weight:500;
    background:var(--cta);color:#FCF8F2;margin-top:32px;
    box-shadow:0 16px 32px -16px rgba(142,120,166,.6);
    transition:background .25s ease,transform .25s ease;
  }
  .cta:hover{background:var(--cta-hover);transform:translateY(-1px)}
</style>
</head>
<body data-analytics-page="thank_you">

<img class="glyph" src="assets/brand/glyph-plum.svg" alt="" aria-hidden="true">
<h1>Thank you.</h1>
<p>Your First Sip Box is being packed. You'll get a shipping note as soon as it leaves the studio.</p>
<p>Keep an eye on your inbox for brewing notes for each of the three teas.</p>
<p class="order" id="order-line" hidden>Order reference <code id="order-id"></code></p>
<a href="/" class="cta">Back to varitea.com</a>

<script>
  (function () {
    var p = new URLSearchParams(location.search);
    var orderId = p.get('session_id') || p.get('order_id');
    if (orderId) {
      document.getElementById('order-id').textContent = orderId;
      document.getElementById('order-line').hidden = false;
    }
  })();
</script>

<!-- Analytics — fires `purchase_completed` automatically via data-analytics-page="thank_you" -->
<script src="js/app.js" defer></script>
</body>
</html>
