<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#F8F2EA">
<title>Build your routine — Varitea (s2 routine builder)</title>

<!--
  Screen 2 — Research-backed daily routine builder (EXP-002, Phase 1)
  Designer: Jared (Brand/Design/Conversion) · Built by: Computer

  The research IS the product. Varitea is an aesthetic, branding-first tea
  company; the moat is the evidence-based daypart routine (now) + Val's
  packaging-science track (later).

  What changed from the 3-tea carousel:
  - Selection is now a research-backed DAYPART routine builder.
  - Four dayparts (Morning · Afternoon · Evening · Night), one blend each.
    Naming: Dark Morning · Tart Cooler · Mint Reset · Moon Bloom.
  - User toggles dayparts ON to assemble a routine; a natural-language line
    describes it live ("a roasted morning, a tart afternoon, a soft night").
  - A small TM research icon opens the research blog — the moat content.
  - Same aesthetic preserved: ambient pour, lane tint, leaf burst, meta line,
    matte pouches, Instrument Serif names, prefers-reduced-motion fallbacks.

  Boundaries enforced: no health claims, no shipping promises, no invented
  reviews. Copy stays ritual/taste/timing/caffeine-free only.

  Analytics: event NAMES stay stable for Ronny. The parent bridge still
  postMessages selections; tea_name comes straight from data-role (now the
  daypart blend names). New routine-level signal: varitea:s2_routine_changed.
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    /* Tokens — extracted from site/index.html + jared-spool-varitea-ux-workspace.md */
    --off-white:#F8F2EA;
    --cream:#FCF8F2;
    --linen:#E9DDCF;
    --ink:#2D241E;
    --charcoal:#2E241F;
    --lavender:#D8C8E4;
    --dusty:#A793BD;
    --plum:#8E78A6;
    --plum-deep:#463047;
    --sage:#A2AD8E;
    --amber:#D2AE64;
    --blush:#EFD9DC;
    --tan:#CDC9A6;

    --serif:'Instrument Serif',Georgia,serif;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;

    --r-sm:10px; --r-md:18px; --r-lg:28px;
    --shadow-soft:0 24px 60px -28px rgba(45,36,30,.35);
    --ease:cubic-bezier(.22,.61,.36,1);
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--off-white)}
  body{
    font-family:var(--sans);
    color:var(--charcoal);
    overflow:hidden;
    overscroll-behavior:none;
    touch-action:pan-y;
    -webkit-font-smoothing:antialiased;
  }

  /* ===== Stage ===== */
  .stage{
    position:relative;
    width:100%;
    height:100dvh;
    min-height:100svh;
    overflow:hidden;
    isolation:isolate;
    background:var(--off-white);
  }

  /* Lane-tinted radial that shifts as the active daypart changes */
  .stage::before{
    content:"";
    position:absolute;inset:0;
    background:radial-gradient(120% 80% at 30% 18%,
      var(--lane-tint-a,#EFE3D6) 0%,
      var(--lane-tint-b,#F8F2EA) 55%,
      var(--cream) 100%);
    transition:background 900ms var(--ease);
    z-index:0;
  }

  /* Ambient pour video — quiet, restrained, never the focus */
  .ambient{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:cover;
    opacity:.14;
    mix-blend-mode:multiply;
    filter:saturate(.7) contrast(.95) blur(0.5px);
    z-index:1;
    pointer-events:none;
    transition:opacity 900ms var(--ease);
  }
  .stage[data-active="0"] .ambient{opacity:.18}
  .stage[data-active="1"] .ambient{opacity:.13}
  .stage[data-active="2"] .ambient{opacity:.11}
  .stage[data-active="3"] .ambient{opacity:.09}

  /* Three.js canvas for leaf burst — sits between video and pouch */
  #leaves{
    position:absolute;inset:0;
    width:100%;height:100%;
    z-index:2;
    pointer-events:none;
  }

  /* ===== Top: progress dots ===== */
  .nav{
    position:absolute;top:max(20px,env(safe-area-inset-top));left:0;right:0;
    display:flex;justify-content:center;gap:10px;
    z-index:6;
  }
  .dot{
    width:6px;height:6px;border-radius:50%;
    background:rgba(45,36,30,.22);
    transition:width 400ms var(--ease),background 400ms var(--ease);
    cursor:pointer;
  }
  .dot.is-active{width:22px;border-radius:6px;background:var(--ink)}
  .dot.in-routine{background:var(--ink)}

  /* ===== Pouch card stack ===== */
  .pouches{
    position:absolute;left:0;right:0;top:0;
    height:48dvh;min-height:300px;
    z-index:4;
    display:flex;align-items:center;justify-content:center;
    padding:72px 24px 8px;
  }
  .pouch{
    position:absolute;
    width:min(52vw,264px);
    aspect-ratio:1/1;
    border-radius:var(--r-lg);
    overflow:hidden;
    box-shadow:var(--shadow-soft);
    opacity:0;
    pointer-events:none;
    border:0;background:transparent;padding:0;
    transform:translateY(28px) scale(.94);
    transition:
      opacity 700ms var(--ease),
      transform 700ms var(--ease),
      box-shadow 300ms var(--ease);
    cursor:pointer;
    -webkit-user-select:none;user-select:none;
  }
  .pouch img{
    width:100%;height:100%;object-fit:cover;display:block;
    pointer-events:none;
  }
  .pouch.is-active{
    opacity:1;
    pointer-events:auto;
    transform:translateY(0) scale(1);
  }
  /* "In routine" gets a soft ring so the visual reflects the toggle state */
  .pouch.is-active.picked{
    box-shadow:0 0 0 3px var(--cream), 0 0 0 5px rgba(45,36,30,.45), var(--shadow-soft);
  }
  .pouch.is-active:active{
    transform:translateY(0) scale(.985);
    box-shadow:0 14px 40px -22px rgba(45,36,30,.45);
    transition:transform 120ms var(--ease),box-shadow 120ms var(--ease);
  }
  @keyframes settled{
    0%,100%{box-shadow:var(--shadow-soft)}
    50%   {box-shadow:0 28px 70px -28px rgba(45,36,30,.42)}
  }
  .pouch.is-active:not(.picked){animation:settled 4.2s var(--ease) infinite}

  /* "Added" stamp that flicks on when a daypart joins the routine */
  .added-stamp{
    position:absolute;z-index:5;
    top:18dvh;left:50%;transform:translate(-50%,-12px);
    font-family:var(--serif);font-style:italic;font-size:15px;
    color:var(--ink);background:rgba(252,248,242,.9);
    border:1px solid rgba(45,36,30,.12);
    border-radius:999px;padding:5px 14px;
    opacity:0;pointer-events:none;
    transition:opacity 300ms var(--ease),transform 300ms var(--ease);
  }
  .added-stamp.show{opacity:1;transform:translate(-50%,0)}

  /* ===== Bottom control deck — single flex column, no overlap ===== */
  .deck{
    position:absolute;left:0;right:0;
    bottom:max(16px,env(safe-area-inset-bottom));
    z-index:5;
    display:flex;flex-direction:column;align-items:center;
    gap:14px;
    padding:0 18px;
  }

  /* ===== Lower text block (the blend name + research moat line) ===== */
  .meta{
    text-align:center;
  }
  .meta__role{
    font-family:var(--serif);
    font-style:italic;
    font-size:clamp(28px,7vw,38px);
    line-height:1.05;
    color:var(--ink);
    letter-spacing:-.01em;
    opacity:0;transform:translateY(8px);
    transition:opacity 600ms var(--ease) 80ms,transform 600ms var(--ease) 80ms;
  }
  /* TM research mark — opens the research blog (the moat) */
  .tm{
    display:inline-flex;align-items:center;justify-content:center;
    vertical-align:super;
    margin-left:4px;
    width:20px;height:20px;
    border-radius:50%;
    border:1px solid rgba(45,36,30,.28);
    background:rgba(252,248,242,.7);
    font-family:var(--sans);font-style:normal;font-weight:500;
    font-size:9px;letter-spacing:.02em;line-height:1;
    color:var(--ink);
    text-decoration:none;
    cursor:pointer;
    transition:background 220ms var(--ease),transform 220ms var(--ease),border-color 220ms var(--ease);
  }
  .tm:hover{background:var(--cream);border-color:rgba(45,36,30,.5);transform:translateY(-1px)}
  .tm:active{transform:scale(.92)}
  .meta__sub{
    margin-top:8px;
    font-family:var(--sans);
    font-size:14px;
    color:var(--charcoal);
    opacity:0;transform:translateY(8px);
    transition:opacity 600ms var(--ease) 160ms,transform 600ms var(--ease) 160ms;
  }
  .meta__research{
    margin-top:6px;
    font-family:var(--sans);
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:rgba(45,36,30,.5);
    opacity:0;transform:translateY(8px);
    transition:opacity 600ms var(--ease) 220ms,transform 600ms var(--ease) 220ms;
  }
  .meta.is-in .meta__role,
  .meta.is-in .meta__sub,
  .meta.is-in .meta__research{opacity:1;transform:none}

  /* ===== Add / remove this daypart ===== */
  .pick{
    display:inline-flex;align-items:center;gap:8px;
    height:40px;padding:0 18px;
    border-radius:999px;
    border:1px solid rgba(45,36,30,.18);
    background:rgba(252,248,242,.72);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    font-family:var(--sans);font-weight:500;font-size:13px;letter-spacing:.01em;
    color:var(--ink);cursor:pointer;
    transition:background 220ms var(--ease),border-color 220ms var(--ease),transform 160ms var(--ease);
  }
  .pick:hover{background:var(--cream)}
  .pick:active{transform:scale(.97)}
  .pick .tick{width:14px;height:14px;stroke:var(--ink);fill:none;stroke-width:1.8;opacity:0;transition:opacity 200ms var(--ease)}
  .pick.on{background:var(--ink);color:var(--off-white);border-color:var(--ink)}
  .pick.on .tick{stroke:var(--off-white);opacity:1}

  /* ===== Daypart toggle chips (the routine builder) ===== */
  .chips{
    display:flex;justify-content:center;gap:8px;flex-wrap:wrap;
    max-width:520px;
  }
  .chip{
    display:inline-flex;align-items:center;gap:6px;
    height:34px;padding:0 13px;
    border-radius:999px;
    border:1px solid rgba(45,36,30,.16);
    background:rgba(252,248,242,.55);
    font-family:var(--sans);font-weight:500;font-size:12px;letter-spacing:.01em;
    color:rgba(45,36,30,.7);cursor:pointer;
    transition:background 220ms var(--ease),color 220ms var(--ease),border-color 220ms var(--ease),transform 140ms var(--ease);
  }
  .chip .swatch{width:9px;height:9px;border-radius:50%;background:var(--swatch,#5A3E2A);flex:0 0 auto}
  .chip:active{transform:scale(.96)}
  .chip[aria-current="true"]{border-color:rgba(45,36,30,.42);color:var(--ink)}
  .chip.on{background:var(--ink);color:var(--off-white);border-color:var(--ink)}
  .chip.on .swatch{box-shadow:0 0 0 1.5px rgba(252,248,242,.8)}

  /* ===== Bottom CTA — routine summary + checkout ===== */
  .cta-row{
    display:flex;flex-direction:column;align-items:center;gap:8px;
    width:100%;
  }
  .routine-line{
    font-family:var(--serif);font-style:italic;
    font-size:14px;line-height:1.3;color:var(--ink);
    text-align:center;max-width:520px;
    min-height:18px;
    opacity:.92;
    transition:opacity 300ms var(--ease);
  }
  .cta{
    display:inline-flex;align-items:center;justify-content:center;
    height:54px;padding:0 28px;min-width:min(92vw,320px);
    background:var(--ink);color:var(--off-white);
    border-radius:999px;border:0;
    text-decoration:none;cursor:pointer;
    font-family:var(--sans);font-weight:500;font-size:15px;letter-spacing:.01em;
    box-shadow:0 18px 40px -18px rgba(45,36,30,.55);
    transition:transform 220ms var(--ease),box-shadow 220ms var(--ease),opacity 220ms var(--ease);
  }
  .cta:hover{transform:translateY(-2px);box-shadow:0 22px 50px -18px rgba(45,36,30,.6)}
  .cta:active{transform:translateY(0) scale(.985)}
  .cta[disabled]{opacity:.45;pointer-events:none;box-shadow:none}

  /* Top-left brand mark */
  .mark{
    position:absolute;top:max(16px,env(safe-area-inset-top));left:18px;
    z-index:6;
    font-family:var(--serif);font-style:italic;
    font-size:18px;color:var(--ink);letter-spacing:.005em;
    opacity:.92;
  }

  /* ===== Research drawer (TM blog peek, fast in-page) ===== */
  .drawer-scrim{
    position:fixed;inset:0;z-index:20;
    background:rgba(45,36,30,.32);
    opacity:0;pointer-events:none;
    transition:opacity 320ms var(--ease);
    backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
  }
  .drawer-scrim.open{opacity:1;pointer-events:auto}
  .drawer{
    position:fixed;left:0;right:0;bottom:0;z-index:21;
    max-height:82dvh;overflow-y:auto;
    background:var(--cream);
    border-radius:var(--r-lg) var(--r-lg) 0 0;
    box-shadow:0 -24px 60px -28px rgba(45,36,30,.45);
    transform:translateY(102%);
    transition:transform 380ms var(--ease);
    padding:14px 22px max(26px,env(safe-area-inset-bottom)) 22px;
  }
  .drawer.open{transform:translateY(0)}
  .drawer__grip{width:42px;height:4px;border-radius:999px;background:rgba(45,36,30,.22);margin:2px auto 14px}
  .drawer__eyebrow{font-family:var(--sans);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(45,36,30,.55);margin-bottom:6px}
  .drawer__title{font-family:var(--serif);font-style:italic;font-size:26px;line-height:1.1;color:var(--ink);margin-bottom:10px}
  .drawer__body{font-family:var(--sans);font-size:14px;line-height:1.6;color:var(--charcoal)}
  .drawer__body p{margin-bottom:10px}
  .drawer__body strong{font-weight:500;color:var(--ink)}
  .drawer__more{
    display:inline-flex;align-items:center;gap:6px;margin-top:8px;
    font-family:var(--sans);font-weight:500;font-size:13px;color:var(--ink);
    text-decoration:none;border-bottom:1px solid rgba(45,36,30,.3);padding-bottom:1px;
  }
  .drawer__close{
    position:absolute;top:12px;right:16px;
    width:34px;height:34px;border-radius:50%;border:1px solid rgba(45,36,30,.14);
    background:rgba(252,248,242,.8);display:grid;place-items:center;cursor:pointer;
  }
  .drawer__close svg{width:14px;height:14px;stroke:var(--ink);stroke-width:1.6;fill:none}

  /* prefers-reduced-motion fallbacks */
  @media (prefers-reduced-motion: reduce){
    .ambient{display:none}
    .pouch{transition:opacity 400ms linear}
    .pouch.is-active{animation:none}
    .stage::before{transition:none}
    #leaves{display:none}
    .drawer{transition:none}
  }

  /* Wider screens: keep mobile-first frame but center comfortably */
  @media (min-width: 720px){
    .pouch{width:min(360px,34vw)}
    .drawer{left:50%;right:auto;transform:translate(-50%,102%);width:min(560px,94vw);border-radius:var(--r-lg)}
    .drawer.open{transform:translate(-50%,0)}
  }
</style>
</head>
<body>

<main class="stage" id="stage" data-active="0"
      style="--lane-tint-a:#EFE3D6;--lane-tint-b:#F8F2EA;"
      aria-label="Build your daily tea routine — four research-backed dayparts">

  <!-- Ambient pour video backdrop -->
  <video class="ambient" id="ambient"
         autoplay muted loop playsinline preload="metadata"
         poster="/preview/s2-v2/assets/pour-poster.jpg" aria-hidden="true">
    <source src="/preview/s2-v2/assets/pour-loop-muted.mp4" type="video/mp4">
  </video>

  <!-- Three.js leaf burst layer -->
  <canvas id="leaves" aria-hidden="true"></canvas>

  <!-- Brand mark (hidden when embedded in the landing page) -->
  <span class="mark" data-brandmark>varitea</span>
  <script>
    (function () {
      try {
        var embedded = new URLSearchParams(location.search).get('embed') === '1'
          || window.self !== window.top;
        if (embedded) {
          document.documentElement.setAttribute('data-embed', '1');
          var m = document.querySelector('[data-brandmark]');
          if (m) m.style.display = 'none';
        }
      } catch (e) {}
    })();
  </script>

  <!-- Progress dots (one per daypart) -->
  <nav class="nav" id="nav" aria-label="Daypart position">
    <span class="dot is-active" data-i="0"></span>
    <span class="dot" data-i="1"></span>
    <span class="dot" data-i="2"></span>
    <span class="dot" data-i="3"></span>
  </nav>

  <!-- Pouch stack: one per daypart blend -->
  <div class="pouches" id="pouches">
    <button class="pouch is-active" data-i="0"
            data-daypart="Morning" data-role="Dark Morning"
            data-sub="roasted · grounding · caffeine-free"
            data-research="A roasted morning ritual — without the caffeine"
            data-tint-a="#EFE3D6" data-tint-b="#F8F2EA"
            data-leaf="#5A3E2A" data-swatch="#5A3E2A"
            aria-label="Dark Morning — a roasted morning ritual, tap to add to your routine">
      <img src="/preview/s2-v2/assets/daypart-morning.png" alt="Dark Morning tea canister in matte roasted brown with a cream label">
    </button>
    <button class="pouch" data-i="1"
            data-daypart="Afternoon" data-role="Tart Cooler"
            data-sub="tart · bright · hot or iced"
            data-research="A tart afternoon refresher, hot or iced"
            data-tint-a="#F3DDD3" data-tint-b="#F8EDE6"
            data-leaf="#B4503C" data-swatch="#B4503C"
            aria-label="Tart Cooler — a bright afternoon refresher, tap to add to your routine">
      <img src="/preview/s2-v2/assets/daypart-afternoon.png" alt="Tart Cooler tea canister in warm hibiscus terracotta with a cream label">
    </button>
    <button class="pouch" data-i="2"
            data-daypart="Evening" data-role="Mint Reset"
            data-sub="soft mint · after-dinner · winding down"
            data-research="A soft after-dinner reset to wind the day down"
            data-tint-a="#DEE3CF" data-tint-b="#EDEADC"
            data-leaf="#6A7A52" data-swatch="#6A7A52"
            aria-label="Mint Reset — a soft after-dinner wind-down, tap to add to your routine">
      <img src="/preview/s2-v2/assets/daypart-evening.png" alt="Mint Reset tea canister in soft sage green with a cream label">
    </button>
    <button class="pouch" data-i="3"
            data-daypart="Night" data-role="Moon Bloom"
            data-sub="floral · calm · bedtime"
            data-research="A floral bedtime garden for the last cup of the day"
            data-tint-a="#E4DCEC" data-tint-b="#F1ECF4"
            data-leaf="#8E78A6" data-swatch="#8E78A6"
            aria-label="Moon Bloom — a floral bedtime blend, tap to add to your routine">
      <img src="/preview/s2-v2/assets/daypart-night.png" alt="Moon Bloom tea canister in dusk lavender violet with a cream label">
    </button>
  </div>

  <!-- "Added to routine" stamp -->
  <div class="added-stamp" id="addedStamp">added to your routine</div>

  <!-- Bottom control deck: meta → pick → chips → routine line + CTA -->
  <div class="deck">
    <!-- Blend name + research moat line + TM icon -->
    <div class="meta is-in" id="meta">
      <div class="meta__role" id="role">Dark Morning<a class="tm" id="tm" href="/preview/research/daypart-ritual/" aria-label="Read the research behind this blend">™</a></div>
      <div class="meta__sub" id="sub">roasted · grounding · caffeine-free</div>
      <div class="meta__research" id="research">A roasted morning ritual — without the caffeine</div>
    </div>

    <!-- Add / remove this daypart from the routine -->
    <button class="pick" id="pick" type="button" aria-pressed="false">
      <svg class="tick" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 13l4 4L19 7"/></svg>
      <span id="pickLabel">Add Dark Morning</span>
    </button>

    <!-- Daypart toggle chips -->
    <div class="chips" id="chips" role="group" aria-label="Your daily routine — toggle dayparts">
      <button class="chip" data-i="0" type="button" aria-current="true" style="--swatch:#5A3E2A"><span class="swatch"></span>Morning</button>
      <button class="chip" data-i="1" type="button" style="--swatch:#B4503C"><span class="swatch"></span>Afternoon</button>
      <button class="chip" data-i="2" type="button" style="--swatch:#6A7A52"><span class="swatch"></span>Evening</button>
      <button class="chip" data-i="3" type="button" style="--swatch:#8E78A6"><span class="swatch"></span>Night</button>
    </div>

    <!-- Routine summary + CTA -->
    <div class="cta-row">
      <div class="routine-line" id="routineLine">Tap a daypart to start your routine.</div>
      <button class="cta" id="cta" type="button" disabled
              data-analytics-event="checkout_cta_click"
              data-cta-label="Build my routine">Pick a daypart to begin</button>
    </div>
  </div>

  <!-- Research drawer (TM peek) -->
  <div class="drawer-scrim" id="drawerScrim"></div>
  <aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
    <button class="drawer__close" id="drawerClose" aria-label="Close research"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    <div class="drawer__grip"></div>
    <div class="drawer__eyebrow" id="drawerEyebrow">The research behind it</div>
    <h2 class="drawer__title" id="drawerTitle">Why a tea for every part of the day</h2>
    <div class="drawer__body" id="drawerBody"></div>
    <a class="drawer__more" id="drawerMore" href="/preview/research/daypart-ritual/">Read the full research →</a>
  </aside>

</main>

<!-- Three.js (module, ES build) -->

  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js"
  }
}

<script type="module">
import * as THREE from 'three';

/* ============================================================
   DATA — research-backed daypart drawer copy (the moat).
   Sourced from the deep-research report. Ritual/taste/timing
   framing only — no health/medical claims.
   ============================================================ */
const RESEARCH = {
  0: {
    eyebrow: 'Morning · the research',
    title: 'A roasted morning, minus the caffeine',
    body: `<p>Our research points to a simple truth: most people don't want another stimulant in the morning — they want the <strong>ritual</strong> of one. Dark Morning is built on a roasted, coffee-adjacent base (chicory and rooibos) so the cup feels grounding and familiar.</p>
           <p>The deeper finding is about <strong>choice</strong>. When shoppers face a wall of options, they stall. So we organize the line around four moments of the day instead — you choose <strong>when</strong>, and the blend follows.</p>`
  },
  1: {
    eyebrow: 'Afternoon · the research',
    title: 'A bright reset for the mid-day dip',
    body: `<p>Afternoon is where a hot-or-iced, high-contrast flavor earns its place. Tart Cooler leads with hibiscus for a juicy, refreshing cup that reads as a genuine break in the day.</p>
           <p>Our work on assortment shows that a single, confident flavor story per moment beats a complicated one. One clear afternoon note, not five.</p>`
  },
  2: {
    eyebrow: 'Evening · the research',
    title: 'A soft landing after dinner',
    body: `<p>Evening is a bridge between the day and rest. Mint Reset pairs soft peppermint with gentle herbal notes — a cup that signals the day is winding down.</p>
           <p>The research is clear that a <strong>routine</strong> matters more than any single ingredient. The same cup, at the same time, becomes the cue your evening recognizes.</p>`
  },
  3: {
    eyebrow: 'Night · the research',
    title: 'A floral garden for the last cup',
    body: `<p>Night is the gateway to rest. Moon Bloom is a soft floral blend (chamomile and lavender) framed as a <strong>bedtime ritual</strong>, not a switch you flip.</p>
           <p>This is the heart of why we exist: the research is what we sell. We're an aesthetic, caffeine-free tea brand, and the moat is a daily routine you can actually trust and enjoy.</p>`
  }
};

/* ============================================================
   STATE
   ============================================================ */
const stage   = document.getElementById('stage');
const pouches = [...document.querySelectorAll('.pouch')];
const dots    = [...document.querySelectorAll('.dot')];
const chips   = [...document.querySelectorAll('.chip')];
const role    = document.getElementById('role');
const sub     = document.getElementById('sub');
const research= document.getElementById('research');
const meta    = document.getElementById('meta');
const tm       = document.getElementById('tm');
const pick     = document.getElementById('pick');
const pickLabel= document.getElementById('pickLabel');
const routineLine = document.getElementById('routineLine');
const cta      = document.getElementById('cta');
const ambient  = document.getElementById('ambient');
const addedStamp = document.getElementById('addedStamp');

const drawer = document.getElementById('drawer');
const drawerScrim = document.getElementById('drawerScrim');
const drawerClose = document.getElementById('drawerClose');
const drawerEyebrow = document.getElementById('drawerEyebrow');
const drawerTitle = document.getElementById('drawerTitle');
const drawerBody = document.getElementById('drawerBody');

const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

let active = 0;
const N = pouches.length;
const routine = new Set(); // indices the user has added

/* Natural-language fragments for the routine summary line */
const NL = {
  0: 'a roasted morning',
  1: 'a tart afternoon',
  2: 'a soft evening',
  3: 'a floral night'
};

/* ============================================================
   ANALYTICS PARENT BRIDGE
   Event NAMES stay stable for Ronny. tea_name comes from
   data-role (now the daypart blend names). We also emit a
   routine-level signal so Ronny can learn which dayparts win.
   ============================================================ */
function postParent(msg){
  try{
    if (window.parent && window.parent !== window){
      window.parent.postMessage(msg, window.location.origin);
    }
  }catch(e){}
}
function reportSelection(i, interaction){
  const p = pouches[i]; if(!p) return;
  postParent({
    type:'varitea:s2_tea_selected',
    tea_name: p.dataset.role,
    daypart: p.dataset.daypart,
    lane_index: i,
    interaction: interaction || 'tap'
  });
}
function reportRoutineChange(action, i){
  const p = pouches[i];
  postParent({
    type:'varitea:s2_routine_changed',
    action: action,                 // 'add' | 'remove'
    tea_name: p ? p.dataset.role : null,
    daypart: p ? p.dataset.daypart : null,
    routine_size: routine.size,
    routine: [...routine].map(k => pouches[k].dataset.role)
  });
}

/* ============================================================
   ROUTINE SUMMARY + CTA STATE
   ============================================================ */
function buildRoutineLine(){
  const idx = [...routine].sort((a,b)=>a-b);
  if(idx.length === 0){
    routineLine.textContent = 'Tap a daypart to start your routine.';
    cta.disabled = true;
    cta.textContent = 'Pick a daypart to begin';
    return;
  }
  const parts = idx.map(k => NL[k]);
  let phrase;
  if(parts.length === 1) phrase = parts[0];
  else if(parts.length === 2) phrase = parts[0] + ' and ' + parts[1];
  else phrase = parts.slice(0,-1).join(', ') + ', and ' + parts[parts.length-1];
  routineLine.textContent = 'Your routine: ' + phrase + '.';
  cta.disabled = false;
  const n = idx.length;
  cta.textContent = n === 1
    ? 'Build my routine — 1 blend'
    : 'Build my routine — ' + n + ' blends';
}

function syncPickButton(){
  const inRoutine = routine.has(active);
  const name = pouches[active].dataset.role;
  pick.classList.toggle('on', inRoutine);
  pick.setAttribute('aria-pressed', String(inRoutine));
  pickLabel.textContent = inRoutine ? ('Added · ' + name) : ('Add ' + name);
  pouches[active].classList.toggle('picked', inRoutine);
}

function syncChips(){
  chips.forEach((c,k)=>{
    c.classList.toggle('on', routine.has(k));
    c.setAttribute('aria-current', String(k === active));
  });
  dots.forEach((d,k)=>{
    d.classList.toggle('is-active', k === active);
    d.classList.toggle('in-routine', routine.has(k));
  });
}

function flashAdded(text){
  addedStamp.textContent = text;
  addedStamp.classList.add('show');
  clearTimeout(flashAdded._t);
  flashAdded._t = setTimeout(()=>addedStamp.classList.remove('show'), 1100);
}

function toggleRoutine(i, interaction){
  const wasIn = routine.has(i);
  if(wasIn){ routine.delete(i); }
  else { routine.add(i); }
  reportRoutineChange(wasIn ? 'remove' : 'add', i);
  if(!wasIn){
    flashAdded('added to your routine');
    if(!reduceMotion) burstAt(i);
  }
  buildRoutineLine();
  syncPickButton();
  syncChips();
}

/* ============================================================
   POUCH / DAYPART SWITCHING
   ============================================================ */
function setActive(i, opts = {}){
  if(i < 0 || i > N-1 || i === active) return;
  active = i;
  pouches.forEach((p,k)=>p.classList.toggle('is-active', k===i));
  const p = pouches[i];

  meta.classList.remove('is-in');
  setTimeout(()=>{
    role.childNodes[0].nodeValue = p.dataset.role; // keep the TM anchor intact
    sub.textContent  = p.dataset.sub;
    research.textContent = p.dataset.research;
    meta.classList.add('is-in');
  }, 200);

  stage.dataset.active = String(i);
  stage.style.setProperty('--lane-tint-a', p.dataset.tintA);
  stage.style.setProperty('--lane-tint-b', p.dataset.tintB);

  syncPickButton();
  syncChips();

  if(!reduceMotion && !opts.silent) burstAt(i);
  reportSelection(i, opts.interaction);
}

/* ============================================================
   THREE.JS LEAF BURST (preserved from the original screen)
   ============================================================ */
const canvas   = document.getElementById('leaves');
const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,10);
camera.position.z = 5;

function resize(){
  const w = stage.clientWidth, h = stage.clientHeight;
  renderer.setSize(w, h, false);
  camera.left = -w/2; camera.right = w/2;
  camera.top = h/2;   camera.bottom = -h/2;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize); resize();

function leafTexture(color){
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128;
  const g = c.getContext('2d');
  g.translate(64,64);
  g.shadowColor = 'rgba(45,36,30,.25)';
  g.shadowBlur = 8; g.shadowOffsetY = 2;
  g.beginPath();
  g.moveTo(0,-48);
  g.bezierCurveTo(28,-36, 28,36, 0,48);
  g.bezierCurveTo(-28,36, -28,-36, 0,-48);
  g.closePath();
  g.fillStyle = color;
  g.fill();
  g.shadowColor = 'transparent';
  g.strokeStyle = 'rgba(0,0,0,.18)';
  g.lineWidth = 1.2;
  g.beginPath();
  g.moveTo(0,-44); g.lineTo(0,44); g.stroke();
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

const textures = {};
pouches.forEach(p => {
  const hex = p.dataset.leaf;
  if(!textures[hex]) textures[hex] = leafTexture(hex);
});

const POOL_SIZE = 80;
const pool = [];
for(let i=0;i<POOL_SIZE;i++){
  const mat = new THREE.MeshBasicMaterial({ transparent:true, depthWrite:false });
  const geo = new THREE.PlaneGeometry(38, 38);
  const m = new THREE.Mesh(geo, mat);
  m.visible = false;
  scene.add(m);
  pool.push({ mesh:m, alive:false });
}

function burst(originX, originY, colorHex){
  const tex = textures[colorHex] || Object.values(textures)[0];
  const count = 22 + Math.floor(Math.random()*8);
  const t0 = performance.now();
  let spawned = 0;
  for(const slot of pool){
    if(spawned >= count) break;
    if(slot.alive) continue;
    slot.alive = true;
    spawned++;
    const m = slot.mesh;
    m.material.map = tex;
    m.material.opacity = 0;
    m.material.needsUpdate = true;
    m.visible = true;
    m.position.set(originX, originY, 0);
    const angle = (-Math.PI/2) + (Math.random()-.5)*Math.PI*0.9;
    const speed = 120 + Math.random()*220;
    const drift = (Math.random()-.5)*0.8;
    const spin  = (Math.random()-.5)*4;
    const life  = 1500 + Math.random()*1200;
    const scale = 0.5 + Math.random()*0.9;
    m.scale.set(scale, scale, 1);
    slot.start = t0;
    slot.vx = Math.cos(angle)*speed;
    slot.vy = Math.sin(angle)*speed;
    slot.drift = drift;
    slot.spin = spin;
    slot.life = life;
    slot.x = originX;
    slot.y = originY;
    slot.rot = (Math.random()-.5)*Math.PI;
  }
}

function burstAt(i){
  const p = pouches[i]; if(!p) return;
  const rect = p.getBoundingClientRect();
  const stageRect = stage.getBoundingClientRect();
  const cx = (rect.left - stageRect.left) + rect.width/2 - stageRect.width/2;
  const cy = -((rect.top - stageRect.top) + rect.height/2) + stageRect.height/2;
  burst(cx, cy, p.dataset.leaf);
}

let prevT = performance.now();
function tick(now){
  const dt = Math.min(50, now - prevT) / 1000;
  prevT = now;
  for(const slot of pool){
    if(!slot.alive) continue;
    const elapsed = now - slot.start;
    const t = elapsed / slot.life;
    if(t >= 1){ slot.alive = false; slot.mesh.visible = false; continue; }
    const decay = 1 - t;
    slot.x += slot.vx * dt * decay;
    slot.vy += 280 * dt;
    slot.x += slot.drift * 40 * dt;
    slot.rot += slot.spin * dt;
    slot.mesh.position.set(slot.x, slot.y - slot.vy*dt, 0);
    slot.mesh.rotation.z = slot.rot;
    let a = 1;
    if(t < .12) a = t / .12;
    else if(t > .65) a = 1 - (t - .65) / .35;
    slot.mesh.material.opacity = Math.max(0, a) * 0.95;
  }
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
if(!reduceMotion) requestAnimationFrame(tick);

/* ============================================================
   RESEARCH DRAWER (TM peek)
   ============================================================ */
function openDrawer(i){
  const r = RESEARCH[i] || RESEARCH[0];
  drawerEyebrow.textContent = r.eyebrow;
  drawerTitle.textContent = r.title;
  drawerBody.innerHTML = r.body;
  drawerScrim.classList.add('open');
  drawer.classList.add('open');
  postParent({ type:'varitea:s2_research_opened', tea_name: pouches[i].dataset.role, daypart: pouches[i].dataset.daypart });
}
function closeDrawer(){
  drawerScrim.classList.remove('open');
  drawer.classList.remove('open');
}
tm.addEventListener('click', (e)=>{ e.preventDefault(); openDrawer(active); });
drawerClose.addEventListener('click', closeDrawer);
drawerScrim.addEventListener('click', closeDrawer);
window.addEventListener('keydown', e => { if(e.key === 'Escape') closeDrawer(); });

/* ============================================================
   INPUT
   ============================================================ */
// Tap a pouch → toggle that daypart into the routine
pouches.forEach((p,idx) => {
  p.addEventListener('pointerdown', (e) => {
    if(!p.classList.contains('is-active')) return;
    if(!reduceMotion){
      const stageRect = stage.getBoundingClientRect();
      const x = e.clientX - stageRect.left - stageRect.width/2;
      const y = -(e.clientY - stageRect.top - stageRect.height/2);
      burst(x, y, p.dataset.leaf);
      p.animate(
        [{transform:'translateY(0) scale(1)'},{transform:'translateY(-4px) scale(1.015)'},{transform:'translateY(0) scale(1)'}],
        {duration:520, easing:'cubic-bezier(.22,.61,.36,1)'}
      );
    }
    toggleRoutine(idx, 'tap');
  });
});

// Explicit Add/Remove button
pick.addEventListener('click', ()=> toggleRoutine(active, 'button'));

// Chips: tap to focus a daypart; if already focused, toggle into routine
chips.forEach(c => {
  c.addEventListener('click', ()=>{
    const i = +c.dataset.i;
    if(i === active){ toggleRoutine(i, 'chip'); }
    else { setActive(i, {interaction:'chip', silent:true}); }
  });
});

// Dots
dots.forEach(d => d.addEventListener('click', ()=>setActive(+d.dataset.i, {interaction:'dot'})));

// Swipe between dayparts
let touchX = null;
stage.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, {passive:true});
stage.addEventListener('touchend', e => {
  if(touchX == null) return;
  const dx = (e.changedTouches[0].clientX) - touchX;
  if(Math.abs(dx) > 50){ setActive(active + (dx < 0 ? 1 : -1), {interaction:'swipe'}); }
  touchX = null;
}, {passive:true});

// Keyboard arrows move between dayparts
window.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight') setActive(active+1, {interaction:'arrow'});
  if(e.key === 'ArrowLeft')  setActive(active-1, {interaction:'arrow'});
});

// CTA → bubble routine up to the parent landing page (which owns checkout)
cta.addEventListener('click', ()=>{
  if(cta.disabled) return;
  postParent({
    type:'varitea:s2_routine_checkout',
    routine: [...routine].sort((a,b)=>a-b).map(k => pouches[k].dataset.role),
    routine_size: routine.size
  });
});

// Pause ambient video when tab is hidden (battery)
document.addEventListener('visibilitychange', () => {
  if(document.hidden) ambient.pause(); else ambient.play().catch(()=>{});
});
ambient.play().catch(()=>{});

/* Initial paint */
buildRoutineLine();
syncPickButton();
syncChips();
</script>
</body>
